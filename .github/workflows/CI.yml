name: CI

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'CHANGELOG.md'
      - 'README.md'
      - 'cobalt_renderer_sys/README.md'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - 'CHANGELOG.md'
      - 'README.md'
      - 'cobalt_renderer_sys/README.md'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

# Cancel any previously running instance of this workflow when a new commit is pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.head_ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            runner: windows-latest
          - name: macOS ARM64
            runner: macos-latest
          - name: Ubuntu x64
            runner: ubuntu-latest
          - name: Ubuntu ARM64
            runner: ubuntu-26.04-arm

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install LLVM components        
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libunwind-dev libc++-dev libc++abi-dev

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy

      - name: Build
        run: cargo build --features download_sdk

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets --features download_sdk -- -D warnings

      - name: Run tests
        run: cargo test --all-targets --features download_sdk

      - name: Check documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps --features download_sdk

