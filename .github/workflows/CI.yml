name: CI

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'CHANGELOG.md'
      - 'README.md'
      - 'cobalt_renderer_sys/README.md'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - 'CHANGELOG.md'
      - 'README.md'
      - 'cobalt_renderer_sys/README.md'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

# Cancel any previously running instance of this workflow when a new commit is pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.head_ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            runner: windows-latest
          - name: macOS ARM64
            runner: macos-latest
          - name: Ubuntu x64
            runner: ubuntu-latest
          - name: Ubuntu ARM64
            runner: ubuntu-26.04-arm

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Required Components        
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y cmake
          sudo apt install -y ninja-build
          sudo apt install -y clang
          sudo apt install -y libc++-dev libc++abi-dev
          sudo apt install -y git
          sudo apt install -y pkg-config
          sudo apt install -y libxcb1 libxcb1-dev
          sudo apt install -y libx11-dev
          sudo apt install -y libx11-xcb-dev
          sudo apt install -y libwayland-dev
          sudo apt install -y libcairo-dev
          sudo apt install -y libxrandr-dev
          sudo apt install -y mesa-utils mesa-common-dev libgl1-mesa-dev libglu1-mesa-dev
          sudo apt install -y xsltproc
          sudo apt install -y libxcursor-dev
          sudo apt install -y build-essential git make pkg-config cmake ninja-build gnome-desktop-testing libasound2-dev libpulse-dev libaudio-dev libfribidi-dev libjack-dev libsndio-dev libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxfixes-dev libxi-dev libxss-dev libxtst-dev libxkbcommon-dev libdrm-dev libgbm-dev libgl1-mesa-dev libgles2-mesa-dev libegl1-mesa-dev libdbus-1-dev libibus-1.0-dev libudev-dev libthai-dev
          sudo apt install -y wayland-protocols

          # Install and configure lavapipe for a software Vulkan driver
          sudo apt install -y mesa-vulkan-drivers

          machine="$(uname -m)"
          if [ "$machine" = "arm64" ]; then
            machine="aarch64"
          elif [ "$machine" = "i386" ]; then
            machine="i686"
          fi

          lavapipe_icd="/usr/share/vulkan/icd.d/lvp_icd.$machine.json"
          if [ ! -f "$lavapipe_icd" ]; then
            lavapipe_icd="$(find /usr/share/vulkan/icd.d -maxdepth 1 -name 'lvp_icd*.json' | sort | head -n 1)"
          fi

          if [ -z "${lavapipe_icd:-}" ] || [ ! -f "$lavapipe_icd" ]; then
            echo "Lavapipe Vulkan ICD was not found." >&2
            find /usr/share/vulkan/icd.d -maxdepth 1 -type f -print >&2 || true
            exit 1
          fi

          echo "Using Lavapipe Vulkan ICD: $lavapipe_icd"
          export VK_DRIVER_FILES="$lavapipe_icd"
          export VK_ICD_FILENAMES="$lavapipe_icd"

          {
            echo "VK_DRIVER_FILES=$lavapipe_icd"
            echo "VK_ICD_FILENAMES=$lavapipe_icd"
          } >> "$GITHUB_ENV"

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy

      - name: Build
        run: cargo build --features download_sdk

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets --features download_sdk -- -D warnings

      - name: Run tests
        run: cargo test --no-fail-fast --all-targets --features download_sdk -- --show-output

      - name: Check documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps --features download_sdk

