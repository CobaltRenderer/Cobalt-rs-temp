name: "CLA Assistant"

"on":
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

jobs:
  CLAssistant:
    runs-on: ubuntu-latest
    environment: cla-assistant
    permissions:
      actions: write
      contents: write
      pull-requests: write
      statuses: write

    steps:
      - name: "CLA Assistant"
        if: >
          (
            github.event_name == 'issue_comment' &&
            github.event.issue.pull_request &&
            (
              github.event.comment.body == 'recheck' ||
              github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA'
            )
          ) ||
          github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_ASSISTANT_ACCESS_TOKEN }}
        with:
          remote-organization-name: CobaltRenderer
          remote-repository-name: Agreements
          path-to-signatures: 'IndividualCLASignatures.json'
          path-to-document: 'https://github.com/CobaltRenderer/Agreements/blob/main/IndividualCLA.md'
          branch: 'main'
          lock-pullrequest-aftermerge: false
